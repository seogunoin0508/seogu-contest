<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>서구노인종합복지관 제54회 어버이날 기념 작품공모전</title>
  <meta name="description" content="서구노인종합복지관 제54회 어버이날 기념 작품공모전 블라인드 투표 사이트" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --color-primary: #1e3a5f;
      --color-primary-dark: #14263f;
      --color-primary-light: #2c5282;
      --color-accent: #c69963;
      --color-accent-dark: #a67c48;
      --color-bg: #f7f8fa;
      --color-bg-card: #ffffff;
      --color-border: #e2e8f0;
      --color-border-strong: #cbd5e0;
      --color-text: #1a202c;
      --color-text-muted: #4a5568;
      --color-text-light: #718096;
      --color-success: #2f855a;
      --color-error: #c53030;
      --color-warning: #b7791f;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
      --shadow-lg: 0 10px 25px rgba(0,0,0,0.08);
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
      --transition: all 0.2s ease;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: var(--color-bg);
      color: var(--color-text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    button { font-family: inherit; cursor: pointer; border: none; background: none; }
    input, textarea, select { font-family: inherit; font-size: 15px; }
    img { max-width: 100%; display: block; }

    /* Layout */
    .app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: var(--color-bg-card);
      border-bottom: 1px solid var(--color-border);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      user-select: none;
    }

    .brand-mark {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--color-primary), var(--color-primary-light));
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: -0.5px;
    }

    .brand-text h1 {
      font-size: 16px;
      font-weight: 700;
      color: var(--color-text);
      letter-spacing: -0.3px;
    }

    .brand-text p {
      font-size: 12px;
      color: var(--color-text-light);
      font-weight: 500;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 18px;
      border-radius: var(--radius-sm);
      font-weight: 500;
      font-size: 14px;
      transition: var(--transition);
      white-space: nowrap;
      border: 1px solid transparent;
    }

    .btn-primary {
      background: var(--color-primary);
      color: #fff;
    }
    .btn-primary:hover { background: var(--color-primary-dark); }

    .btn-secondary {
      background: var(--color-bg-card);
      color: var(--color-text);
      border-color: var(--color-border);
    }
    .btn-secondary:hover { background: var(--color-bg); border-color: var(--color-border-strong); }

    .btn-accent {
      background: var(--color-accent);
      color: #fff;
    }
    .btn-accent:hover { background: var(--color-accent-dark); }

    .btn-ghost {
      background: transparent;
      color: var(--color-text-muted);
    }
    .btn-ghost:hover { background: var(--color-bg); color: var(--color-text); }

    .btn-danger {
      background: #fff;
      color: var(--color-error);
      border-color: #fed7d7;
    }
    .btn-danger:hover { background: #fef5f5; }

    .btn-lg { padding: 14px 26px; font-size: 16px; }
    .btn-sm { padding: 6px 12px; font-size: 13px; }
    .btn-block { width: 100%; }

    .main {
      flex: 1;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      padding: 32px 24px 64px;
    }

    /* Home / Category selection */
    .hero {
      text-align: center;
      padding: 28px 16px 40px;
    }

    .hero-eyebrow {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 100px;
      background: rgba(30, 58, 95, 0.06);
      color: var(--color-primary);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 16px;
    }

    .hero h2 {
      font-size: 32px;
      font-weight: 700;
      color: var(--color-text);
      letter-spacing: -1px;
      line-height: 1.25;
      margin-bottom: 12px;
    }

    .hero p {
      color: var(--color-text-muted);
      max-width: 620px;
      margin: 0 auto;
      font-size: 15px;
    }

    .section-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--color-text);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-title::before {
      content: '';
      width: 3px;
      height: 16px;
      background: var(--color-primary);
      border-radius: 2px;
    }

    .category-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
      margin-top: 8px;
    }

    .category-card {
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 24px;
      transition: var(--transition);
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .category-card:hover {
      border-color: var(--color-primary-light);
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }

    .category-card.disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
    .category-card.disabled:hover { transform: none; box-shadow: none; }

    .category-card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .category-icon {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: rgba(30, 58, 95, 0.08);
      color: var(--color-primary);
      display: grid;
      place-items: center;
      font-size: 20px;
    }

    .category-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 100px;
      letter-spacing: 0.3px;
    }
    .badge-active { background: #e6f4ea; color: var(--color-success); }
    .badge-draft { background: #f1f3f5; color: var(--color-text-light); }
    .badge-completed { background: #ebeaff; color: #4c51bf; }

    .category-card h3 {
      font-size: 17px;
      font-weight: 600;
      color: var(--color-text);
      margin-bottom: 4px;
      line-height: 1.3;
    }

    .category-card .sub {
      font-size: 13px;
      color: var(--color-text-light);
      margin-bottom: 16px;
    }

    .category-stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 14px;
      border-top: 1px solid var(--color-border);
    }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .stat-value {
      font-size: 16px;
      font-weight: 600;
      color: var(--color-text);
    }
    .stat-label {
      font-size: 11px;
      color: var(--color-text-light);
      font-weight: 500;
    }

    /* Voter view */
    .vote-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--color-text-muted);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }
    .back-link:hover { color: var(--color-primary); }

    .round-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--color-primary);
      color: #fff;
      padding: 8px 16px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    /* ── 라운드 안내 배너 ────────────────────────────── */
    .round-banner {
      background: linear-gradient(135deg, #eef4ff 0%, #e0ebff 100%);
      border: 1.5px solid #b4ccff;
      border-radius: var(--radius-md);
      padding: 18px 22px;
      margin: 16px 0 14px;
      box-shadow: 0 4px 14px rgba(30, 58, 95, 0.06);
    }
    .round-banner .round-stepper {
      display: flex;
      align-items: center;
      gap: 0;
      margin-bottom: 14px;
    }
    .round-banner .step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      flex: 1;
      min-width: 0;
    }
    .round-banner .step .dot {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #ffffff;
      border: 2px solid #c8d6ee;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: #8193b1;
      transition: all 0.25s ease;
    }
    .round-banner .step.done .dot {
      background: #a9c2f2;
      border-color: #7099e0;
      color: #fff;
    }
    .round-banner .step.current .dot {
      background: var(--color-primary);
      border-color: var(--color-primary);
      color: #fff;
      transform: scale(1.18);
      box-shadow: 0 0 0 4px rgba(30, 58, 95, 0.15);
    }
    .round-banner .step .label {
      font-size: 11px;
      font-weight: 600;
      color: #8193b1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 80px;
    }
    .round-banner .step.current .label { color: var(--color-primary); font-weight: 800; font-size: 12px; }
    .round-banner .step.done .label { color: #6485b8; }
    .round-banner .connector {
      flex: 0 0 auto;
      height: 2px;
      background: #c8d6ee;
      align-self: flex-start;
      margin-top: 15px;
      min-width: 8px;
      width: 100%;
      max-width: 64px;
    }
    .round-banner .connector.done { background: #7099e0; }

    .round-banner .round-title-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }
    .round-banner .round-title {
      font-size: 22px;
      font-weight: 800;
      color: var(--color-primary);
      line-height: 1.2;
    }
    .round-banner .round-position {
      font-size: 13px;
      font-weight: 600;
      color: #6485b8;
      background: #ffffffaa;
      padding: 2px 10px;
      border-radius: 999px;
      border: 1px solid #c8d6ee;
    }
    .round-banner .round-desc {
      font-size: 13.5px;
      line-height: 1.55;
      color: #3a4a66;
      padding-top: 8px;
      border-top: 1px dashed #c8d6ee;
      margin-top: 8px;
    }
    .round-banner .round-desc strong { color: var(--color-primary); }

    @media (max-width: 520px) {
      .round-banner .step .label { font-size: 10px; max-width: 60px; }
      .round-banner .round-title { font-size: 19px; }
    }

    .progress-wrap {
      margin-bottom: 28px;
    }
    .progress-text {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--color-text-muted);
      margin-bottom: 8px;
    }
    .progress-bar {
      height: 6px;
      background: var(--color-border);
      border-radius: 100px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--color-primary), var(--color-accent));
      transition: width 0.4s ease;
      border-radius: 100px;
    }

    /* 인기투표 작품 그리드 */
    .vote-entry-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }
    .vote-entry-card {
      position: relative;
      transition: var(--transition);
    }
    .vote-entry-card.selected {
      border-color: var(--color-primary) !important;
      background: rgba(30,58,95,0.04) !important;
      box-shadow: 0 0 0 3px rgba(30,58,95,0.15);
    }
    .vote-entry-check {
      display: none;
      margin-top: 14px;
      text-align: center;
      font-size: 13px;
      font-weight: 700;
      color: var(--color-primary);
      padding: 6px;
      background: rgba(30,58,95,0.07);
      border-radius: var(--radius-sm);
    }
    .vote-entry-card.selected .vote-entry-check { display: block; }

    .match-wrap {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 20px;
      align-items: stretch;
    }

    .entry-card {
      background: var(--color-bg-card);
      border: 2px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 28px;
      display: flex;
      flex-direction: column;
      transition: var(--transition);
      cursor: pointer;
      min-height: 320px;
    }

    .entry-card:hover {
      border-color: var(--color-primary-light);
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }

    .entry-card.selected {
      border-color: var(--color-primary);
      background: rgba(30, 58, 95, 0.03);
    }

    .entry-label {
      display: inline-block;
      font-size: 12px;
      font-weight: 600;
      color: var(--color-accent-dark);
      letter-spacing: 0.8px;
      margin-bottom: 14px;
    }

    .entry-poem {
      display: flex;
      flex-direction: column;
      gap: 14px;
      flex: 1;
    }
    .entry-poem .line {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .entry-poem .char {
      display: inline-grid;
      place-items: center;
      width: 30px;
      height: 30px;
      background: var(--color-primary);
      color: #fff;
      border-radius: 6px;
      font-weight: 700;
      font-size: 14px;
      flex-shrink: 0;
    }
    .entry-poem .text {
      font-size: 16px;
      color: var(--color-text);
      padding-top: 3px;
      line-height: 1.5;
      word-break: keep-all;
    }

    .entry-letter-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--color-text);
      margin-bottom: 12px;
    }
    .entry-letter-body {
      font-size: 15px;
      color: var(--color-text);
      white-space: pre-wrap;
      word-break: keep-all;
      line-height: 1.7;
      flex: 1;
      overflow-y: auto;
      max-height: 460px;
    }

    .entry-photo {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      border-radius: var(--radius-sm);
      margin-bottom: 14px;
      background: var(--color-bg);
    }
    .entry-photo-caption {
      font-size: 14px;
      color: var(--color-text-muted);
      flex: 1;
      word-break: keep-all;
    }

    .vs-divider {
      display: grid;
      place-items: center;
      position: relative;
      min-width: 50px;
    }
    .vs-circle {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid var(--color-primary);
      color: var(--color-primary);
      font-weight: 900;
      font-size: 18px;
      display: grid;
      place-items: center;
      z-index: 2;
      letter-spacing: 0.5px;
    }

    .vote-action {
      margin-top: 24px;
      display: flex;
      justify-content: center;
      gap: 12px;
    }

    .state-card {
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 64px 32px;
      text-align: center;
    }
    .state-card .emoji {
      font-size: 40px;
      margin-bottom: 12px;
      display: block;
    }
    .state-card h3 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--color-text);
    }
    .state-card p {
      color: var(--color-text-muted);
      max-width: 480px;
      margin: 0 auto 20px;
    }

    .finalists {
      margin-top: 28px;
      display: grid;
      gap: 16px;
    }
    .finalist-row {
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 20px 24px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 16px;
    }
    .finalist-rank {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-weight: 700;
      font-size: 16px;
      flex-shrink: 0;
    }
    .rank-1 { background: linear-gradient(135deg, #fde68a, #d97706); color: #fff; }
    .rank-2 { background: linear-gradient(135deg, #e2e8f0, #94a3b8); color: #fff; }
    .rank-3 { background: linear-gradient(135deg, #fcd9b6, #b97745); color: #fff; }
    .rank-other { background: var(--color-bg); color: var(--color-text-muted); border: 1px solid var(--color-border); }

    /* Modal */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(15, 23, 42, 0.55);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
      overflow-y: auto;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: #fff;
      border-radius: var(--radius-lg);
      width: 100%;
      max-width: 680px;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-lg);
      overflow: hidden;
    }
    .modal-lg { max-width: 960px; }
    .modal-header {
      padding: 22px 28px;
      border-bottom: 1px solid var(--color-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-header h3 {
      font-size: 18px;
      font-weight: 600;
    }
    .modal-close {
      width: 32px; height: 32px;
      border-radius: 6px;
      display: grid; place-items: center;
      color: var(--color-text-light);
      font-size: 20px;
    }
    .modal-close:hover { background: var(--color-bg); color: var(--color-text); }
    .modal-body { padding: 24px 28px; overflow-y: auto; flex: 1; }
    .modal-footer {
      padding: 18px 28px;
      border-top: 1px solid var(--color-border);
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    /* Forms */
    .form-group { margin-bottom: 18px; }
    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--color-text-muted);
      margin-bottom: 6px;
      letter-spacing: 0.2px;
    }
    .form-input, .form-textarea, .form-select {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid var(--color-border-strong);
      border-radius: var(--radius-sm);
      background: #fff;
      font-size: 15px;
      color: var(--color-text);
      transition: var(--transition);
    }
    .form-input:focus, .form-textarea:focus, .form-select:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(30, 58, 95, 0.08);
    }
    .form-textarea { resize: vertical; min-height: 90px; font-family: inherit; }
    .form-hint { font-size: 12px; color: var(--color-text-light); margin-top: 6px; }

    .poem-grid {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px 12px;
      align-items: center;
    }
    .poem-char-label {
      font-weight: 700;
      color: var(--color-primary);
      background: rgba(30, 58, 95, 0.06);
      padding: 8px 14px;
      border-radius: 6px;
      text-align: center;
    }

    /* Admin */
    .admin-tabs {
      display: flex;
      gap: 2px;
      border-bottom: 1px solid var(--color-border);
      margin-bottom: 24px;
      overflow-x: auto;
    }
    .admin-tab {
      padding: 12px 18px;
      color: var(--color-text-muted);
      font-weight: 500;
      font-size: 14px;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
    }
    .admin-tab.active {
      color: var(--color-primary);
      border-bottom-color: var(--color-primary);
      font-weight: 600;
    }

    .admin-section {
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 24px;
      margin-bottom: 20px;
    }
    .admin-section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .admin-section-head h4 {
      font-size: 16px;
      font-weight: 600;
    }
    .admin-section-head .counter {
      font-size: 13px;
      color: var(--color-text-light);
    }

    .entry-list {
      display: grid;
      gap: 10px;
    }
    .entry-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 14px;
      align-items: center;
      padding: 12px 14px;
      background: var(--color-bg);
      border-radius: var(--radius-sm);
      border: 1px solid var(--color-border);
    }
    .entry-thumb {
      width: 56px;
      height: 56px;
      border-radius: 6px;
      object-fit: cover;
      background: var(--color-border);
    }
    .entry-item-text {
      min-width: 0;
      overflow: hidden;
    }
    .entry-item-text .ttl {
      font-weight: 600;
      font-size: 14px;
      color: var(--color-text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .entry-item-text .prv {
      font-size: 12px;
      color: var(--color-text-light);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }
    .entry-item-actions { display: flex; gap: 6px; }

    .bracket-info {
      background: rgba(30, 58, 95, 0.04);
      border: 1px solid rgba(30, 58, 95, 0.12);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      margin-bottom: 16px;
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      font-size: 13px;
    }
    .bracket-info strong { color: var(--color-primary); font-weight: 600; }

    .rounds-list {
      display: grid;
      gap: 10px;
    }
    .round-card {
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .round-card.active {
      background: rgba(30, 58, 95, 0.04);
      border-color: var(--color-primary);
    }
    .round-card.done { opacity: 0.7; }

    .round-info-block {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .round-info-block .name { font-weight: 600; font-size: 14px; }
    .round-info-block .meta { font-size: 12px; color: var(--color-text-light); }

    .match-list {
      display: grid;
      gap: 8px;
      margin-top: 16px;
    }
    .match-row {
      display: grid;
      grid-template-columns: 40px 1fr auto 1fr;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
      background: #fff;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      font-size: 13px;
    }
    .match-row .m-no {
      color: var(--color-text-light);
      font-weight: 600;
      text-align: center;
    }
    .match-side {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .match-side.winner { color: var(--color-success); font-weight: 600; }
    .match-side .name {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .match-side .vote-count {
      background: var(--color-bg);
      color: var(--color-text-muted);
      padding: 2px 8px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .match-side.winner .vote-count { background: #e6f4ea; color: var(--color-success); }
    .match-row .vs { color: var(--color-text-light); font-size: 11px; }
    .match-row .m-vs {
      color: var(--color-text-light);
      font-size: 11px;
      font-weight: 700;
      text-align: center;
    }
    .match-row .m-e {
      min-width: 0;
      font-size: 13px;
      line-height: 1.4;
    }
    .match-row .m-status {
      font-size: 12px;
      color: var(--color-text-light);
      white-space: nowrap;
      text-align: right;
    }

    /* 1v1 투표 화면 VS 레이아웃 */
    .match-versus {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 16px;
      align-items: start;
    }
    @media (max-width: 600px) {
      .match-versus {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto;
      }
    }
    .match-entry-wrap { min-width: 0; }
    .vs-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--color-primary);
      color: #fff;
      font-weight: 700;
      font-size: 13px;
      margin-top: 60px;
      flex-shrink: 0;
    }
    @media (max-width: 600px) {
      .vs-badge { margin: 0 auto; }
    }

    /* Toast */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 200;
      pointer-events: none;
    }
    .toast {
      background: var(--color-text);
      color: #fff;
      padding: 12px 18px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      min-width: 240px;
      max-width: 360px;
      box-shadow: var(--shadow-lg);
      pointer-events: auto;
      animation: slideIn 0.3s ease;
    }
    .toast.success { background: var(--color-success); }
    .toast.error { background: var(--color-error); }
    .toast.warning { background: var(--color-warning); }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* ── 종목(분야) 테마 배너 ────────────────────────────── */
    .category-theme-banner {
      border-radius: var(--radius-md);
      padding: 22px 24px;
      margin: 18px 0 12px;
      background: linear-gradient(135deg, #fff7f1 0%, #ffeede 100%);
      border: 1.5px solid #f8c9a3;
      box-shadow: 0 6px 18px rgba(210, 115, 40, 0.08);
      position: relative;
      overflow: hidden;
    }
    .category-theme-banner .theme-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .category-theme-banner .theme-icon {
      font-size: 40px;
      line-height: 1;
    }
    .category-theme-banner .theme-text { flex: 1; }
    .category-theme-banner .theme-label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: #b24d08;
      margin-bottom: 4px;
    }
    .category-theme-banner .theme-title {
      font-size: 22px;
      font-weight: 800;
      color: var(--color-text);
      line-height: 1.3;
    }
    .category-theme-banner .theme-title .theme-source {
      display: inline-block;
      margin-left: 8px;
      padding: 2px 10px;
      background: #ffffffcc;
      border: 1px solid #eebfa0;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      color: #a74508;
      vertical-align: middle;
    }
    .category-theme-banner .theme-desc {
      font-size: 14px;
      line-height: 1.55;
      color: var(--color-text-muted);
      margin-top: 10px;
      padding: 10px 14px;
      background: #ffffffa1;
      border-radius: var(--radius-sm);
      border: 1px dashed #f0c79f;
    }
    .category-theme-banner.is-transition {
      animation: themeHighlight 1.6s ease;
    }
    @keyframes themeHighlight {
      0%   { transform: scale(0.98); box-shadow: 0 0 0 0 rgba(255, 165, 0, 0.5); }
      35%  { transform: scale(1.01); box-shadow: 0 0 0 12px rgba(255, 165, 0, 0); }
      100% { transform: scale(1);    box-shadow: 0 6px 18px rgba(210, 115, 40, 0.08); }
    }

    /* 종목 전환 순간에 화면 상단에 잠시 떠오르는 알림 */
    .category-transition-overlay {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1200;
      display: flex;
      justify-content: center;
      pointer-events: none;
      animation: transSlide 2.4s ease forwards;
    }
    .category-transition-overlay .pill {
      margin-top: 16px;
      background: linear-gradient(135deg, #ff9a56, #ff6b6b);
      color: #fff;
      font-weight: 700;
      padding: 12px 22px;
      border-radius: 999px;
      box-shadow: 0 12px 32px rgba(255, 107, 107, 0.35);
      font-size: 15px;
    }
    @keyframes transSlide {
      0%   { transform: translateY(-30px); opacity: 0; }
      15%  { transform: translateY(0);     opacity: 1; }
      80%  { transform: translateY(0);     opacity: 1; }
      100% { transform: translateY(-30px); opacity: 0; }
    }

    /* Loading & states */
    .loading {
      display: grid;
      place-items: center;
      min-height: 300px;
      color: var(--color-text-light);
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--color-border);
      border-top-color: var(--color-primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .config-alert {
      background: #fff7ed;
      border: 1px solid #fdba74;
      border-radius: var(--radius-md);
      padding: 20px 24px;
      margin-bottom: 24px;
      color: #7c2d12;
    }
    .config-alert h4 {
      font-size: 15px;
      margin-bottom: 8px;
      font-weight: 600;
    }
    .config-alert p { font-size: 14px; line-height: 1.6; }
    .config-alert code {
      background: rgba(124, 45, 18, 0.1);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
    }

    /* Footer */
    .footer {
      border-top: 1px solid var(--color-border);
      background: var(--color-bg-card);
      padding: 20px 24px;
      text-align: center;
      color: var(--color-text-light);
      font-size: 12px;
    }

    /* Responsive */
    @media (max-width: 720px) {
      .header-inner { padding: 12px 16px; }
      .brand-text h1 { font-size: 14px; }
      .brand-text p { font-size: 11px; }
      .main { padding: 20px 16px 48px; }
      .hero h2 { font-size: 24px; }
      .category-grid { grid-template-columns: 1fr; }
      .match-wrap {
        grid-template-columns: 1fr;
      }
      .vs-divider {
        padding: 12px 0;
      }
      .entry-card { min-height: auto; padding: 20px; }
      .btn-lg { padding: 12px 20px; font-size: 15px; }
    }

    /* Utility */
    .hidden { display: none !important; }
    .mt-8 { margin-top: 8px; }
    .mt-16 { margin-top: 16px; }
    .mt-24 { margin-top: 24px; }
    .mb-16 { margin-bottom: 16px; }
    .text-center { text-align: center; }
    .text-muted { color: var(--color-text-muted); }
    .flex-between { display: flex; justify-content: space-between; align-items: center; }
    .flex-gap { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  </style>
</head>
<body>

      </div>

  <div class="toast-container" id="toast-container"></div>

  <script type="module">
    // =================================================================
    //  서구노인종합복지관 제54회 어버이날 기념 작품공모전 투표 사이트
    //  - Single-file implementation with Firebase Firestore backend
    //  - Admin mode + Voter mode
    //  - Tournament with random seeding
    // =================================================================

    // ---- CONFIGURATION -----------------------------------------------
    // 여기에 Firebase 콘솔에서 복사한 설정값을 넣어주세요.
    // README.md 의 "Firebase 설정" 섹션을 참고하세요.
    const firebaseConfig = {
      apiKey: "AIzaSyBjuzilWblOfaawPPXQYDtVsi74VnZ0PRA",
      authDomain: "seogunoincontest.firebaseapp.com",
      projectId: "seogunoincontest",
      storageBucket: "seogunoincontest.firebasestorage.app",
      messagingSenderId: "977995795897",
      appId: "1:977995795897:web:566a2cd3b1d824210efa68"
    };

    // 관리자 비밀번호 (원하는 값으로 변경하세요)
    const ADMIN_PASSWORD = "admin1234";

    // ★ 라운드 자동 진행에 필요한 경기당 최소 득표 합계
    // 예: 40 → 한 경기(A vs B)에 A+B 합산 40표 이상 모이면 자동으로 다음 라운드 진행
    // 현장 참가 인원이 더 적을 경우 관리자가 "강제 라운드 마감" 버튼으로 수동 진행 가능
    // 목표 참여자 수 — 관리자 대시보드에 진행률을 보여줄 때 기준선으로 사용합니다.
    // 이 값은 "자동 마감" 임계치가 아니라 단순 표시용입니다.
    // 실제 마감은 관리자가 "결과 공개" 버튼을 눌러야만 이루어집니다.
    let TARGET_PARTICIPANTS = 40;

    const FIREBASE_CONFIGURED = firebaseConfig.apiKey && !firebaseConfig.apiKey.startsWith("YOUR_");

    // ---- CATEGORY DEFINITIONS ----------------------------------------
    // 2026 심사 대상: 현장 접수 2종목 (4행시 / 편지). 다른 종목은 주최 측 결정에 따라 제외되었습니다.
    const CATEGORIES = [
      { id: "poem-offline",   name: "어버이날 4행시",  source: "현장접수",  type: "poem",    icon: "✍️" },
      { id: "letter-offline", name: "가장 따뜻한 편지", source: "현장접수",  type: "letter",  icon: "💌" },
    ];

    // 4행시 주제 (어/버/이/날)
    const POEM_CHARS = ["어", "버", "이", "날"];

    // 각 종목의 주제/취지 설명 — 투표 화면 상단에 크게 표시됩니다.
    function getCategoryThemeDesc(cat) {
      if (!cat) return '';
      if (cat.type === 'poem') {
        return `<strong>주제: "어·버·이·날"</strong> 네 글자로 시작하는 <strong>4행시</strong>입니다. 감사와 사랑의 마음이 가장 잘 담긴 작품을 선택해 주세요.`;
      }
      if (cat.type === 'letter') {
        return `<strong>주제: 내가 가장 사랑하는 사람(가족·친구 등)에게 쓰는 편지</strong>, 또는 <strong>부모님을 회상하며 쓰는 편지</strong>입니다. 마음이 더 깊이 와닿는 편지 한 편을 선택해 주세요.`;
      }
      if (cat.type === 'photo') {
        return `<strong>주제: 가족의 따뜻한 순간</strong>을 담은 사진 작품입니다. 마음에 더 깊이 다가오는 장면을 선택해 주세요.`;
      }
      return '';
    }

    // 화면 상단에 잠시 떠오르는 종목 전환 알림
    function showCategoryTransitionOverlay(cat) {
      // 기존 오버레이가 있으면 제거
      document.querySelectorAll('.category-transition-overlay').forEach(n => n.remove());
      const el = document.createElement('div');
      el.className = 'category-transition-overlay';
      el.innerHTML = `<div class="pill">🔁 종목 전환 · ${cat.icon || ''} ${cat.name}</div>`;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 2600);
    }

    // ---- FIREBASE INIT -----------------------------------------------
    let db = null;
    let usingLocalMode = !FIREBASE_CONFIGURED;

    async function initFirebase() {
      if (!FIREBASE_CONFIGURED) {
        console.warn("[공모전] Firebase 미설정 — 로컬 모드로 동작합니다.");
        return;
      }
      try {
        const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
        const { getFirestore } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
        const app = initializeApp(firebaseConfig);
        db = getFirestore(app);
        window.__firebaseModules = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
      } catch (e) {
        console.error("Firebase 초기화 실패:", e);
        usingLocalMode = true;
      }
    }

    // ---- STORAGE LAYER -----------------------------------------------
    // Unified API: localStorage (fallback) or Firestore (primary)
    const LOCAL_KEY = "seogu-elder-contest-v1";

    function readLocal() {
      try {
        const raw = localStorage.getItem(LOCAL_KEY);
        if (!raw) return { categories: {} };
        return JSON.parse(raw);
      } catch { return { categories: {} }; }
    }
    function writeLocal(data) {
      try { localStorage.setItem(LOCAL_KEY, JSON.stringify(data)); } catch {}
    }

    // Category state structure (in Firestore, one document per category at /categories/{id}):
    //   {
    //     id, name, source, type,
    //     entries: [{ id, title, lines[], body, imageData, caption, addedAt }],
    //     status: 'draft' | 'active' | 'completed',
    //     currentRound: 0,
    //     rounds: [ [{ id, e1, e2, v1, v2, winner }] ]
    //   }
    // Votes at /votes/{categoryId}/voters/{voterId} tracking match->choice

    const DEFAULT_CAT_STATE = { entries: [], status: 'draft', currentRound: 0, rounds: [], byeEntries: [], resultsPublished: false };

    async function loadAllCategories() {
      if (usingLocalMode) {
        const data = readLocal();
        return CATEGORIES.map(c => Object.assign({ ...c, ...DEFAULT_CAT_STATE }, data.categories[c.id] || {}));
      }
      const { collection, getDocs } = window.__firebaseModules;
      const snap = await getDocs(collection(db, "categories"));
      const docs = {};
      snap.forEach(d => { docs[d.id] = d.data(); });
      return CATEGORIES.map(c => Object.assign({ ...c, ...DEFAULT_CAT_STATE }, docs[c.id] || {}));
    }

    async function loadCategory(id) {
      const all = await loadAllCategories();
      return all.find(c => c.id === id);
    }

    async function saveCategory(cat) {
      if (usingLocalMode) {
        const data = readLocal();
        data.categories = data.categories || {};
        data.categories[cat.id] = cat;
        writeLocal(data);
        return;
      }
      const { doc, setDoc } = window.__firebaseModules;
      await setDoc(doc(db, "categories", cat.id), cat);
    }

    function subscribeCategory(id, cb) {
      if (usingLocalMode) {
        // Poll localStorage every 1.5s (single-device demo)
        let last = "";
        const tick = async () => {
          const c = await loadCategory(id);
          const str = JSON.stringify(c);
          if (str !== last) { last = str; cb(c); }
        };
        tick();
        const timer = setInterval(tick, 1500);
        return () => clearInterval(timer);
      }
      const { doc, onSnapshot } = window.__firebaseModules;
      return onSnapshot(doc(db, "categories", id), snap => {
        const base = CATEGORIES.find(c => c.id === id) || {};
        if (snap.exists()) {
          cb(Object.assign({ ...base, ...DEFAULT_CAT_STATE }, snap.data()));
        } else {
          cb({ ...base, ...DEFAULT_CAT_STATE });
        }
      });
    }

    function subscribeAll(cb) {
      if (usingLocalMode) {
        let last = "";
        const tick = async () => {
          const cats = await loadAllCategories();
          const str = JSON.stringify(cats);
          if (str !== last) { last = str; cb(cats); }
        };
        tick();
        const timer = setInterval(tick, 1500);
        return () => clearInterval(timer);
      }
      const { collection, onSnapshot } = window.__firebaseModules;
      return onSnapshot(collection(db, "categories"), snap => {
        const docs = {};
        snap.forEach(d => { docs[d.id] = d.data(); });
        cb(CATEGORIES.map(c => Object.assign({ ...c, ...DEFAULT_CAT_STATE }, docs[c.id] || {})));
      });
    }

    // Voter fingerprint — one vote per browser per match
    function getVoterId() {
      let id = localStorage.getItem("voter-id");
      if (!id) {
        id = "v_" + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
        localStorage.setItem("voter-id", id);
      }
      return id;
    }

    // ---- 1v1 토너먼트 투표 추적 (경기 단위) --------------------------------
    function hasVotedMatch(categoryId, matchId) {
      return !!localStorage.getItem(`voted:match:${categoryId}:${matchId}`);
    }
    function markVotedMatch(categoryId, matchId, choice) {
      localStorage.setItem(`voted:match:${categoryId}:${matchId}`, choice);
    }

    // ---- TOURNAMENT LOGIC --------------------------------------------
    function shuffle(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    // ★ 토너먼트 전 라운드를 한 번에 생성
    //   1라운드: e1/e2에 실제 작품 ID 저장
    //   2라운드~: e1/e2는 null, prevM1/prevM2에 이전 경기 ID 저장
    //   entryVotes: { entryId: 득표수 } 방식으로 투표 누적
    function generateTournament(entries) {
      if (entries.length < 2) throw new Error("작품이 2개 이상 있어야 투표를 시작할 수 있습니다.");
      const shuffled = shuffle(entries);
      const rounds = [];

      // 현재 라운드의 "슬롯" — 1라운드는 실제 entry 객체, 이후는 이전 match 객체
      let slots = shuffled.map(e => ({ type: 'entry', id: e.id }));

      while (slots.length >= 2) {
        const isFirst = rounds.length === 0;
        const matches = [];

        for (let i = 0; i < slots.length; i += 2) {
          const s1 = slots[i];
          const s2 = slots[i + 1] || null;
          const isBye = !s2;
          matches.push({
            id: "m_" + Math.random().toString(36).slice(2, 9),
            // 1라운드: 실제 entry ID; 2라운드~: null (동적 계산)
            e1: isFirst ? s1.id : null,
            e2: isFirst ? (s2?.id || null) : null,
            // 2라운드~: 이전 경기 ID 참조
            prevM1: isFirst ? null : s1.id,
            prevM2: isFirst ? null : (s2?.id || null),
            entryVotes: {},          // { entryId: count }
            winner: (isFirst && isBye) ? s1.id : null,  // 1라운드 부전승만 즉시 결정
            bye: isBye,
          });
        }

        rounds.push({ matches });
        // 다음 라운드의 슬롯 = 현재 라운드의 경기 ID들
        slots = matches.map(m => ({ type: 'match', id: m.id }));
        if (slots.length <= 1) break;
      }

      return { rounds, byeEntries: [] };
    }

    // 경기의 실제 참가 작품(e1, e2)을 동적으로 계산
    // 1라운드: match.e1/e2 직접 반환
    // 2라운드~: prevM1/prevM2 경기의 현재 선두 작품을 반환
    function getEffectiveEntries(match, cat) {
      if (!match.prevM1) {
        // 1라운드 — 작품 ID 직접 저장
        return { e1: match.e1, e2: match.e2 };
      }
      // 2라운드 이상 — 이전 경기의 현재 선두 작품으로 결정
      const allMatches = cat.rounds.flatMap(r => r.matches || []);
      const byId = new Map(allMatches.map(m => [m.id, m]));

      function currentLeader(matchId) {
        if (!matchId) return null;
        const m = byId.get(matchId);
        if (!m) return null;
        if (m.winner) return m.winner;          // 이미 확정된 승자
        const { e1, e2 } = getEffectiveEntries(m, cat);
        if (!e1) return null;
        if (!e2) return e1;                     // 상대 없음(부전승)
        const v1 = (m.entryVotes || {})[e1] || 0;
        const v2 = (m.entryVotes || {})[e2] || 0;
        return v1 >= v2 ? e1 : e2;             // 현재 선두 (동점이면 e1)
      }

      return {
        e1: currentLeader(match.prevM1),
        e2: match.prevM2 ? currentLeader(match.prevM2) : null,
      };
    }

    // 이 사용자가 지금 해당 경기에 투표할 수 있는지 확인
    // — 이전 라운드 경기에 투표 완료 or 부전승·확정된 경우에만 허용
    function canVoteOnMatch(matchId, categoryId, cat) {
      const allMatches = cat.rounds.flatMap(r => r.matches || []);
      const byId = new Map(allMatches.map(m => [m.id, m]));
      const match = byId.get(matchId);
      if (!match) return false;
      if (match.bye) return false;
      if (match.winner) return false;
      if (hasVotedMatch(categoryId, matchId)) return false;

      if (!match.prevM1) return true; // 1라운드는 항상 투표 가능

      // 2라운드~: 직전 경기에 투표 완료 or 부전승·확정 상태여야 함
      function prevReady(prevId) {
        if (!prevId) return true;
        const pm = byId.get(prevId);
        if (!pm) return true;
        if (pm.bye || pm.winner) return true;    // 자동 결정 or 확정
        return hasVotedMatch(categoryId, prevId); // 이 사용자가 투표 완료
      }

      return prevReady(match.prevM1) && prevReady(match.prevM2);
    }

    async function castVote(categoryId, matchId, choice) {
      if (hasVotedMatch(categoryId, matchId)) throw new Error("이미 이 경기에 투표하셨습니다.");
      const cat = await loadCategory(categoryId);

      const allMatches = cat.rounds.flatMap(r => r.matches || []);
      const match = allMatches.find(m => m.id === matchId);
      if (!match) throw new Error("경기를 찾을 수 없습니다.");
      if (match.winner) throw new Error("이미 종료된 경기입니다.");

      // 실제 참가 작품 확인
      const { e1, e2 } = getEffectiveEntries(match, cat);
      const votedEntry = choice === 'e1' ? e1 : e2;
      if (!votedEntry) throw new Error("투표할 작품을 찾을 수 없습니다.");

      // 득표 기록 (작품 ID 기준)
      match.entryVotes = match.entryVotes || {};
      match.entryVotes[votedEntry] = (match.entryVotes[votedEntry] || 0) + 1;

      // ★ 매치 단위 자동 마감 없음 — 관리자가 "결과 공개"를 누를 때까지 모든 경기는 열려있음
      // 사용자는 1라운드부터 결승까지 전 라운드의 모든 경기를 한 번에 심사합니다.

      // 부전승 경기의 승자 자동 처리 (입력이 있는 경우에만)
      cat.rounds.forEach(r => {
        (r.matches || []).forEach(m => {
          if (!m.bye || m.winner) return;
          const { e1: be1 } = getEffectiveEntries(m, cat);
          if (be1) m.winner = be1;
        });
      });

      await saveCategory(cat);
      markVotedMatch(categoryId, matchId, choice);
    }

    // 관리자 강제 마감용: 현재 라운드 기준으로 미완료 경기의 승자를 현재 득표로 확정
    // 동점일 경우 "먼저 접수된 작품"(낮은 addedAt)이 우선합니다. (결과 페이지에서는 공동 순위로도 안내)
    function forceFinalizeTournament(cat) {
      const entryMap = new Map((cat.entries || []).map(e => [e.id, e]));
      const addedAtOf = (id) => {
        const e = entryMap.get(id);
        const t = e && e.addedAt;
        return typeof t === 'number' ? t : Number.MAX_SAFE_INTEGER;
      };
      cat.rounds.forEach(r => {
        (r.matches || []).forEach(m => {
          if (m.winner) return;
          if (m.bye) {
            const { e1 } = getEffectiveEntries(m, cat);
            m.winner = e1 || null;
            return;
          }
          const { e1, e2 } = getEffectiveEntries(m, cat);
          if (!e1 && !e2) return;
          if (!e2) { m.winner = e1; return; }
          const v1 = (m.entryVotes || {})[e1] || 0;
          const v2 = (m.entryVotes || {})[e2] || 0;
          if (v1 > v2) m.winner = e1;
          else if (v2 > v1) m.winner = e2;
          else {
            // 득표 동점 — 먼저 접수된 작품이 토너먼트 진출
            m.winner = addedAtOf(e1) <= addedAtOf(e2) ? e1 : e2;
          }
        });
      });
      cat.status = 'completed';
    }

    // 하위 호환 — handlePublishResults 등에서 while(status==='active') autoAdvanceRound 호출
    function autoAdvanceRound(cat) { forceFinalizeTournament(cat); }

    function roundName(round, totalRounds, currentIdx) {
      const matches = (round && round.matches) ? round.matches : [];
      const active = matches.filter(m => !m.bye).length;
      if (active <= 1) return "결승";
      if (active <= 2) return "준결승";
      if (active <= 4) return "8강";
      return currentIdx === 0 ? "1라운드" : `${currentIdx + 1}라운드`;
    }

    // 각 라운드가 어떤 단계인지 간단한 설명을 반환
    function getRoundDescription(rName, currentIdx, totalRounds) {
      if (rName === '결승') {
        return '마지막 두 작품의 대결입니다. 승자가 <strong>1위</strong>, 패자가 <strong>2위</strong>가 됩니다.';
      }
      if (rName === '준결승') {
        return '4개 작품이 맞붙는 단계입니다. 이기면 <strong>결승</strong>으로, 지면 <strong>3위 후보</strong>가 됩니다.';
      }
      if (rName === '8강') {
        return '8개 작품이 4개 경기로 맞붙는 단계입니다. 이긴 작품만 다음 라운드로 올라갑니다.';
      }
      if (currentIdx === 0) {
        return '전체 작품을 2개씩 짝지어 비교하는 <strong>첫 대결</strong>입니다. 두 작품 중 더 마음에 드는 쪽을 선택해 주세요.';
      }
      return '앞선 라운드를 통과한 작품들이 다시 겨루는 단계입니다. 더 마음에 드는 쪽을 선택해 주세요.';
    }

    function calcTotalRounds(entryCount) {
      if (entryCount <= 1) return 1;
      let rounds = 0, n = entryCount;
      while (n > 1) { n = Math.ceil(n / 2); rounds++; }
      return rounds;
    }

    // ---- ROUTING -----------------------------------------------------
    const state = {
      route: 'home',      // 'home' | 'vote' | 'admin' | 'admin-category'
      categoryId: null,
      isAdmin: false,
      categories: [],
      category: null,
      unsubscribe: null,
      // 투표 화면에서 분야가 전환될 때 토스트를 한 번 띄우기 위한 추적값
      lastVoterCatId: null,
    };

    function parseHash() {
      const h = location.hash.slice(1);
      if (!h) return { route: 'home' };
      const parts = h.split("/");
      if (parts[0] === "vote") return { route: 'vote', categoryId: parts[1] || null };
      if (parts[0] === "results" && parts[1]) return { route: 'results', categoryId: parts[1] };
      if (parts[0] === "admin") {
        if (parts[1]) return { route: 'admin-category', categoryId: parts[1] };
        return { route: 'admin' };
      }
      return { route: 'home' };
    }

    function navigate(hash) { location.hash = hash; }

    window.addEventListener("hashchange", handleRoute);

    async function handleRoute() {
      const { route, categoryId } = parseHash();
      if (state.unsubscribe) { state.unsubscribe(); state.unsubscribe = null; }
      state.route = route;
      state.categoryId = categoryId;
      if (route !== 'vote') state.lastVoterCatId = null; // 투표 이외 화면으로 나가면 초기화

      if (route === 'vote') {
        renderVoterLoading();
        state.unsubscribe = subscribeAll(cats => {
          state.categories = cats;
          renderVoterQueue(categoryId);
        });
      } else if (route === 'results') {
        renderVoterLoading();
        state.unsubscribe = subscribeCategory(categoryId, cat => {
          state.category = cat;
          if (cat.resultsPublished) {
            renderVoterCompleted(cat);
          } else {
            main.innerHTML = `
              <a class="back-link" id="back-home">◀ 처음으로</a>
              <div class="state-card mt-24">
                <span class="emoji">🔒</span>
                <h3>결과 발표를 준비 중입니다</h3>
                <p>관리자가 결과를 공개할 때까지 잠시만 기다려주세요.</p>
              </div>
            `;
            document.getElementById("back-home").onclick = () => navigate('');
          }
        });
      } else if (route === 'admin') {
        if (!state.isAdmin) {
          openModal("admin-login-modal");
          navigate('');
          return;
        }
        renderHome(); // show admin dashboard via renderHome admin mode
        state.unsubscribe = subscribeAll(cats => {
          state.categories = cats;
          renderAdminDashboard();
        });
      } else if (route === 'admin-category') {
        if (!state.isAdmin) { openModal("admin-login-modal"); navigate(''); return; }
        renderAdminCategoryLoading();
        state.unsubscribe = subscribeCategory(categoryId, cat => {
          state.category = cat;
          renderAdminCategory();
        });
      } else {
        // home
        renderHomeLoading();
        state.unsubscribe = subscribeAll(cats => {
          state.categories = cats;
          renderHome();
        });
      }
    }

    // ---- RENDERERS ---------------------------------------------------
    const main = document.getElementById("main");

    function renderHomeLoading() {
      main.innerHTML = `<div class="loading"><div class="spinner"></div></div>`;
    }
    function renderVoterLoading() {
      main.innerHTML = `<div class="loading"><div class="spinner"></div></div>`;
    }
    function renderAdminCategoryLoading() {
      main.innerHTML = `<div class="loading"><div class="spinner"></div></div>`;
    }

    function renderHome() {
      const cats = state.categories;
      const configNotice = !FIREBASE_CONFIGURED ? `
        <div class="config-alert">
          <h4>⚠️ 데모(로컬) 모드로 실행 중</h4>
          <p>
            현재 Firebase가 설정되지 않아 <strong>이 브라우저에만 저장되는 데모 모드</strong>로 동작합니다.
            여러 사용자가 링크로 접속해 투표하려면 <code>index.html</code> 파일 상단 <code>firebaseConfig</code> 항목에
            Firebase 콘솔의 프로젝트 설정값을 입력해주세요. 자세한 방법은 함께 제공된 <code>README.md</code> 를 참고하세요.
          </p>
        </div>
      ` : '';

      const activeCount = cats.filter(c => c.status === 'active').length;
      const publishedCount = cats.filter(c => c.resultsPublished).length;
      const hasActive = activeCount > 0;
      const hasPublished = publishedCount > 0;

      main.innerHTML = `
        <section class="hero">
          <div class="hero-eyebrow">서구노인종합복지관</div>
          <h2>제54회 어버이날 기념<br/>작품공모전 블라인드 투표</h2>
          <p>
            감사와 사랑의 마음이 담긴 작품들을 만나보세요.<br/>
            아래 버튼 하나로 <strong>어버이날 4행시</strong>와 <strong>가장 따뜻한 편지</strong>(현장접수) 두 종목을 차례로 심사하실 수 있습니다.
          </p>
          ${hasActive ? `
            <div style="margin-top:28px;">
              <button class="btn btn-primary btn-lg" id="start-voting-btn" style="padding:16px 36px; font-size:17px; border-radius:100px;">🗳️ 투표 시작하기</button>
            </div>
            <div style="margin-top:12px; font-size:13px; color: var(--color-text-light);">
              두 종목의 모든 경기를 순서대로 차례로 보여드립니다.
            </div>
          ` : `
            <div style="margin-top:20px; padding:14px 20px; background: var(--color-bg-card); border-radius:100px; display:inline-block; color: var(--color-text-muted); font-size:14px;">
              ⏳ 아직 투표가 시작되지 않았습니다
            </div>
          `}
        </section>

        ${configNotice}

        ${hasPublished ? `
          <div class="section-title">🏆 결과 발표</div>
          <div class="category-grid" style="margin-bottom:32px;">
            ${cats.filter(c => c.resultsPublished).map(renderCategoryCard).join("")}
          </div>
        ` : ''}

        <div class="section-title">공모 분야 현황</div>
        <div class="category-grid" id="category-grid">
          ${cats.filter(c => !c.resultsPublished).map(renderCategoryCard).join("")}
        </div>

        <div class="mt-24" style="text-align:center; color: var(--color-text-light); font-size:13px;">
          링크를 공유하면 여러 분들이 함께 투표에 참여할 수 있습니다.
        </div>
      `;

      const startBtn = document.getElementById("start-voting-btn");
      if (startBtn) startBtn.onclick = () => navigate('vote');

      // Click handler for category cards
      document.querySelectorAll("[data-go-vote]").forEach(el => {
        el.addEventListener("click", () => {
          const id = el.dataset.goVote;
          const c = state.categories.find(x => x.id === id);
          if (!c) return;
          // If results published for this cat, show them
          if (c.resultsPublished) {
            navigate(`results/${id}`);
            return;
          }
          // Otherwise go to queue mode filtered by this category
          if (c.status !== 'active') {
            toast("아직 투표가 시작되지 않은 분야입니다.", "warning");
            return;
          }
          navigate(`vote/${id}`);
        });
      });
    }

    function renderCategoryCard(c) {
      const entryCount = (c.entries || []).length;
      let statusText = "투표 대기 중";
      let badgeClass = "badge-draft";
      let disabled = c.status !== 'active' && !c.resultsPublished;
      if (c.status === 'active') { statusText = "투표 진행 중"; badgeClass = "badge-active"; }
      else if (c.resultsPublished) { statusText = "결과 공개"; badgeClass = "badge-completed"; }
      else if (c.status === 'completed') { statusText = "결과 발표 대기"; badgeClass = "badge-completed"; disabled = true; }

      let roundInfo = "-";
      if (c.status === 'active' && c.rounds?.length) {
        // 모든 라운드가 동시에 열려있는 구조 — 라운드 수 표시
        roundInfo = `${c.rounds.length}라운드`;
      } else if (c.resultsPublished) {
        roundInfo = "🏆";
      } else if (c.status === 'completed') {
        roundInfo = "대기 중";
      }

      return `
        <div class="category-card ${disabled ? 'disabled' : ''}" data-go-vote="${c.id}">
          <div class="category-card-top">
            <div class="category-icon">${c.icon}</div>
            <span class="category-badge ${badgeClass}">${statusText}</span>
          </div>
          <h3>${c.name}</h3>
          <div class="sub">${c.source}</div>
          <div class="category-stats">
            <div class="stat">
              <span class="stat-value">${entryCount}</span>
              <span class="stat-label">등록 작품</span>
            </div>
            <div class="stat">
              <span class="stat-value">${roundInfo}</span>
              <span class="stat-label">현재 상태</span>
            </div>
          </div>
        </div>
      `;
    }

    // ---- VOTER VIEW ─ 전 라운드 한 번에 투표 --------------------------------
    // 1인이 1라운드 → 2라운드 → 결승까지 쉬지 않고 한 번에 완주하는 방식
    // filterCatId 는 "어느 분야부터 시작할지"에 대한 힌트일 뿐, 항상 모든 활성 분야를 순차로 안내한다.
    async function renderVoterQueue(filterCatId = null) {
      const cats = state.categories;
      const allActive = cats.filter(c => c.status === 'active');
      // 선호 분야가 있으면 맨 앞에 두고 나머지 활성 분야를 뒤에 이어 붙인다.
      let activeCats = allActive;
      if (filterCatId) {
        const head = allActive.filter(c => c.id === filterCatId);
        const tail = allActive.filter(c => c.id !== filterCatId);
        activeCats = head.concat(tail);
      }

      if (activeCats.length === 0) {
        const anyCompleted = cats.some(c => c.status === 'completed' || c.resultsPublished);
        const anyDraft = cats.some(c => c.status === 'draft');
        if (anyCompleted) {
          main.innerHTML = `
            <div class="state-card mt-24" style="padding:60px 32px;">
              <span class="emoji">🙏</span>
              <h3>모든 분야에 대한 투표를 마치셨습니다</h3>
              <p style="font-size:16px; line-height:1.8; margin-top:12px;">
                28일 오후 2시 투표 결과가 공개됩니다.<br/>
                <strong>감사합니다.</strong>
              </p>
            </div>`;
        } else {
          main.innerHTML = `
            <a class="back-link" id="back-home">◀ 처음으로</a>
            <div class="state-card mt-24">
              <span class="emoji">⏳</span>
              <h3>아직 투표가 시작되지 않았습니다</h3>
              <p>${anyDraft ? '관리자가 투표를 시작하면 이곳에서 참여하실 수 있습니다.' : '진행 중인 투표가 없습니다.'}</p>
              <button class="btn btn-secondary" id="home-btn">처음으로</button>
            </div>`;
          document.getElementById("back-home")?.addEventListener("click", () => navigate(''));
          document.getElementById("home-btn")?.addEventListener("click", () => navigate(''));
        }
        return;
      }

      // ★ 핵심: 전체 라운드에서 투표 가능한 첫 번째 경기 탐색
      //   - canVoteOnMatch: 이전 라운드 경기에 투표 완료한 경우에만 통과
      //   - 따라서 1라운드 → 2라운드 → 결승 순서로 자동 진행
      let pendingMatch = null, pendingCat = null, pendingRoundIdx = 0;

      for (const c of activeCats) {
        for (let ri = 0; ri < c.rounds.length; ri++) {
          const roundObj = c.rounds[ri];
          for (const m of (roundObj.matches || [])) {
            if (canVoteOnMatch(m.id, c.id, c)) {
              pendingMatch = m;
              pendingCat = c;
              pendingRoundIdx = ri;
              break;
            }
          }
          if (pendingMatch) break;
        }
        if (pendingMatch) break;
      }

      // 전체 투표 진행률 계산 (모든 라운드 포함)
      const totalVotable = activeCats.reduce((sum, c) =>
        sum + c.rounds.reduce((s2, r) => s2 + (r.matches || []).filter(m => !m.bye).length, 0), 0);
      const totalVoted = activeCats.reduce((sum, c) =>
        sum + c.rounds.reduce((s2, r) =>
          s2 + (r.matches || []).filter(m => !m.bye && (m.winner || hasVotedMatch(c.id, m.id))).length, 0), 0);
      const pct = totalVotable === 0 ? 0 : Math.round((totalVoted / totalVotable) * 100);

      if (!pendingMatch) {
        main.innerHTML = `
          <div class="state-card mt-24" style="padding:60px 32px;">
            <span class="emoji">🙏</span>
            <h3>모든 분야에 대한 투표를 마치셨습니다</h3>
            <p style="font-size:16px; line-height:1.8; margin-top:12px;">
              28일 오후 2시 투표 결과가 공개됩니다.<br/>
              <strong>감사합니다.</strong>
            </p>
          </div>`;
        return;
      }

      const cat = pendingCat;
      const match = pendingMatch;
      const round = cat.rounds[pendingRoundIdx];
      const entryMap = new Map((cat.entries || []).map(e => [e.id, e]));
      const total = calcTotalRounds((cat.entries || []).length);
      const rName = roundName(round, total, pendingRoundIdx);

      // 동적으로 실제 참가 작품 결정
      const { e1: effectiveE1, e2: effectiveE2 } = getEffectiveEntries(match, cat);
      const entryA = entryMap.get(effectiveE1);
      const entryB = effectiveE2 ? entryMap.get(effectiveE2) : null;

      // 이 분야의 남은 경기 수
      const catPendingCount = cat.rounds.reduce((s, r) =>
        s + (r.matches || []).filter(m => !m.bye && !m.winner && !hasVotedMatch(cat.id, m.id)).length, 0);

      // 순서상 현재 분야 이후에 아직 투표할 경기가 남아있는 분야 수
      const currentIdx = activeCats.findIndex(x => x.id === cat.id);
      const upcomingCats = activeCats.slice(currentIdx + 1).filter(c2 =>
        (c2.rounds || []).some(r =>
          (r.matches || []).some(m => !m.bye && !m.winner && !hasVotedMatch(c2.id, m.id))
        )
      );
      const nextCat = upcomingCats[0] || null;
      const upcomingCount = upcomingCats.length;

      // 분야 전환 여부 판단 — 이전 투표 화면에서 다른 종목을 보고 있었으면 "전환" 취급
      const isCategoryTransition = !!state.lastVoterCatId && state.lastVoterCatId !== cat.id;
      state.lastVoterCatId = cat.id;
      if (isCategoryTransition) {
        // 전환 오버레이는 렌더 이후에 띄움 (아래 setTimeout에서 호출)
        setTimeout(() => showCategoryTransitionOverlay(cat), 20);
      }

      // 종목별 테마 설명
      const themeDesc = getCategoryThemeDesc(cat);

      // 라운드 스테퍼용 데이터 — 각 라운드의 이름과 상태(완료/진행중/대기)
      const totalRoundsOfCat = cat.rounds.length;
      const roundSteps = cat.rounds.map((r, idx) => ({
        idx,
        name: roundName(r, totalRoundsOfCat, idx),
        state: idx < pendingRoundIdx ? 'done' : (idx === pendingRoundIdx ? 'current' : 'pending'),
      }));
      const roundDesc = getRoundDescription(rName, pendingRoundIdx, totalRoundsOfCat);
      const stepperHtml = roundSteps.map((s, i) => `
        ${i > 0 ? `<div class="connector ${s.state === 'pending' ? '' : 'done'}"></div>` : ''}
        <div class="step ${s.state}">
          <div class="dot">${s.state === 'done' ? '✓' : (i + 1)}</div>
          <div class="label">${s.name}</div>
        </div>
      `).join('');

      main.innerHTML = `
        <a class="back-link" id="back-home">◀ 처음으로</a>

        <div class="category-theme-banner ${isCategoryTransition ? 'is-transition' : ''}" id="cat-theme-banner">
          <div class="theme-row">
            <div class="theme-icon">${cat.icon || '🎯'}</div>
            <div class="theme-text">
              <div class="theme-label">심사 종목 ${activeCats.length > 1 ? `${currentIdx + 1} / ${activeCats.length}` : ''}</div>
              <div class="theme-title">
                ${cat.name}
                <span class="theme-source">${cat.source}</span>
              </div>
            </div>
          </div>
          ${themeDesc ? `<div class="theme-desc">${themeDesc}</div>` : ''}
        </div>

        <div class="round-banner" id="round-banner">
          ${totalRoundsOfCat > 1 ? `
          <div class="round-stepper">
            ${stepperHtml}
          </div>` : ''}
          <div class="round-title-row">
            <div class="round-title">⚔️ ${rName}</div>
            <div class="round-position">${pendingRoundIdx + 1} / ${totalRoundsOfCat} 라운드 · 전체 진행률 ${pct}%</div>
          </div>
          <div class="round-desc">${roundDesc}</div>
        </div>

        <div class="vote-header" style="margin-top:8px;">
          <div style="font-size:13px; color:var(--color-text-muted); font-weight:500;">
            이 종목 남은 경기 <strong style="color:var(--color-primary);">${catPendingCount}개</strong>${upcomingCount > 0 ? ` · 이후 <strong style="color:var(--color-primary);">${upcomingCount}개 종목</strong> 대기` : ''}
          </div>
        </div>
        ${nextCat ? `
        <div style="background:rgba(52,168,83,0.07); border:1px dashed rgba(52,168,83,0.32); border-radius:var(--radius-sm); padding:10px 14px; margin: 10px 0 18px; font-size:12.5px; color:#1f6f3c;">
          🔜 이 종목을 마치면 <strong>${nextCat.icon || ''} ${nextCat.name}</strong> 종목으로 이어서 진행됩니다.
        </div>
        ` : ''}

        <div class="progress-wrap">
          <div class="progress-text"><span>투표 진행률 (전 라운드)</span><span>${pct}%</span></div>
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        </div>

        <div style="background:rgba(30,58,95,0.04); border:1px solid rgba(30,58,95,0.12); border-radius:var(--radius-sm); padding:12px 16px; margin-bottom:24px; font-size:13px; color:var(--color-text-muted);">
          💡 두 작품 중 <strong>더 마음에 드는 작품 1개</strong>를 선택하여 투표해 주세요. (블라인드 투표)
        </div>

        <div class="match-versus" id="match-versus">
          <div class="match-entry-wrap" id="wrap-e1">
            <div class="vote-entry-card entry-card" id="card-e1" data-choice="e1" style="cursor:pointer;">
              <span class="entry-label">작품 A</span>
              ${entryA ? renderEntryContent(entryA, cat.type) : '<div style="padding:40px;text-align:center;color:var(--color-text-light);">작품 없음</div>'}
              <div class="vote-entry-check">✓ A 선택</div>
            </div>
          </div>
          <div class="vs-badge">VS</div>
          <div class="match-entry-wrap" id="wrap-e2">
            ${entryB ? `
            <div class="vote-entry-card entry-card" id="card-e2" data-choice="e2" style="cursor:pointer;">
              <span class="entry-label">작품 B</span>
              ${renderEntryContent(entryB, cat.type)}
              <div class="vote-entry-check">✓ B 선택</div>
            </div>` : `
            <div class="entry-card" style="display:flex;align-items:center;justify-content:center;min-height:120px;">
              <div style="color:var(--color-text-light); font-size:14px;">— 부전승 —</div>
            </div>`}
          </div>
        </div>

        <div class="vote-action" style="margin-top:28px;">
          <button class="btn btn-primary btn-lg btn-block" id="vote-confirm-btn" disabled>
            작품을 선택해주세요
          </button>
        </div>
        <div class="text-center text-muted mt-16" style="font-size:13px;">
          블라인드 투표입니다. 신중하게 선택해주세요.<br/>각 경기는 <strong>1회만 투표</strong>할 수 있습니다.
        </div>
      `;

      document.getElementById("back-home").onclick = () => navigate('');

      let selectedChoice = null;

      ["card-e1", "card-e2"].forEach(id => {
        const card = document.getElementById(id);
        if (!card) return;
        card.onclick = () => {
          document.querySelectorAll(".vote-entry-card").forEach(c => c.classList.remove("selected"));
          card.classList.add("selected");
          selectedChoice = card.dataset.choice;
          const btn = document.getElementById("vote-confirm-btn");
          if (btn) {
            btn.disabled = false;
            btn.textContent = `${selectedChoice === 'e1' ? 'A' : 'B'} 작품에 투표하기 ✓`;
          }
        };
      });

      document.getElementById("vote-confirm-btn").onclick = async () => {
        if (!selectedChoice) return;
        const btn = document.getElementById("vote-confirm-btn");
        btn.disabled = true;
        btn.textContent = "투표 중...";
        try {
          await castVote(cat.id, match.id, selectedChoice);
          toast(`투표 완료! 감사합니다.`, "success");
          setTimeout(() => renderVoterQueue(filterCatId), 200);
        } catch (e) {
          toast(e.message || "투표 중 오류가 발생했습니다.", "error");
          btn.disabled = false;
          btn.textContent = `${selectedChoice === 'e1' ? 'A' : 'B'} 작품에 투표하기 ✓`;
        }
      };
    }

    // 작품 내용 렌더 (투표 카드 안에서 사용)
    function renderEntryContent(entry, type) {
      if (!entry) return '';
      if (type === 'poem') {
        const lines = entry.lines || ['','','',''];
        return `<div class="entry-poem" style="gap:10px;">
          ${lines.map((t, i) => `
            <div class="line">
              <span class="char">${POEM_CHARS[i]}</span>
              <span class="text" style="font-size:15px;">${escapeHtml(t || '')}</span>
            </div>`).join('')}
        </div>`;
      } else if (type === 'letter') {
        return `
          ${entry.title ? `<div class="entry-letter-title" style="font-size:16px;">${escapeHtml(entry.title)}</div>` : ''}
          <div class="entry-letter-body" style="max-height:200px;">${escapeHtml(entry.body || '')}</div>`;
      } else {
        return `
          ${entry.imageData ? `<img class="entry-photo" src="${entry.imageData}" alt="photo" />` : `<div class="entry-photo" style="display:grid;place-items:center;color:var(--color-text-light);">이미지 없음</div>`}
          <div class="entry-photo-caption">${escapeHtml(entry.caption || '')}</div>`;
      }
    }

    // 투표용 작품 카드 (선택 UI 포함)
    function renderVoteEntryCard(entry, type, num) {
      let content = '';
      if (type === 'poem') {
        const lines = entry.lines || ['','','',''];
        content = `<div class="entry-poem" style="gap:10px;">
          ${lines.map((t,i) => `
            <div class="line">
              <span class="char">${POEM_CHARS[i]}</span>
              <span class="text" style="font-size:15px;">${escapeHtml(t || '')}</span>
            </div>`).join('')}
        </div>`;
      } else if (type === 'letter') {
        content = `
          ${entry.title ? `<div class="entry-letter-title" style="font-size:16px;">${escapeHtml(entry.title)}</div>` : ''}
          <div class="entry-letter-body" style="max-height:200px;">${escapeHtml(entry.body || '')}</div>`;
      } else {
        content = `
          ${entry.imageData ? `<img class="entry-photo" src="${entry.imageData}" alt="photo" />` : `<div class="entry-photo" style="display:grid;place-items:center;color:var(--color-text-light);">이미지 없음</div>`}
          <div class="entry-photo-caption">${escapeHtml(entry.caption || '')}</div>`;
      }
      return `
        <div class="vote-entry-card entry-card" data-entry-id="${entry.id}" style="cursor:pointer;">
          <span class="entry-label">작품 ${num}</span>
          ${content}
          <div class="vote-entry-check">✓ 선택</div>
        </div>`;
    }

    function renderEntryCard(entry, type, label) {
      if (!entry) return `<div class="entry-card"><div class="entry-label">— 부전승 —</div></div>`;
      if (type === 'poem') {
        const lines = entry.lines || ['','','',''];
        return `
          <div class="entry-card" data-entry-id="${entry.id}">
            <span class="entry-label">작품 ${label}</span>
            <div class="entry-poem">
              ${lines.map((t,i) => `
                <div class="line">
                  <span class="char">${POEM_CHARS[i]}</span>
                  <span class="text">${escapeHtml(t || '')}</span>
                </div>
              `).join("")}
            </div>
          </div>
        `;
      }
      if (type === 'letter') {
        return `
          <div class="entry-card" data-entry-id="${entry.id}">
            <span class="entry-label">작품 ${label}</span>
            ${entry.title ? `<div class="entry-letter-title">${escapeHtml(entry.title)}</div>` : ''}
            <div class="entry-letter-body">${escapeHtml(entry.body || '')}</div>
          </div>
        `;
      }
      // photo
      return `
        <div class="entry-card" data-entry-id="${entry.id}">
          <span class="entry-label">작품 ${label}</span>
          ${entry.imageData ? `<img class="entry-photo" src="${entry.imageData}" alt="photo" />` : `<div class="entry-photo" style="display:grid;place-items:center;color:var(--color-text-light);">이미지 없음</div>`}
          <div class="entry-photo-caption">${escapeHtml(entry.caption || '')}</div>
        </div>
      `;
    }

    function renderVoterCompleted(c) {
      const entryMap = new Map((c.entries || []).map(e => [e.id, e]));

      // 결승(마지막 라운드 비부전승 경기)
      const finalRound = c.rounds[c.rounds.length - 1];
      const finalMatch = (finalRound?.matches || []).find(m => !m.bye) || null;

      // 준결승(마지막-1 라운드 비부전승 경기들)
      const semiRound = c.rounds.length >= 2 ? c.rounds[c.rounds.length - 2] : null;
      const semiMatches = (semiRound?.matches || []).filter(m => !m.bye);

      // 결과 항목 목록 생성
      //   각 항목: { rank, entry, votes, tieReason? }
      //   - 동점이면 같은 rank 를 공유하며 tieReason 을 표시합니다.
      const rows = [];

      if (finalMatch) {
        const { e1, e2 } = getEffectiveEntries(finalMatch, c);
        const v1 = (finalMatch.entryVotes || {})[e1] || 0;
        const v2 = (finalMatch.entryVotes || {})[e2] || 0;

        if (e1 && e2 && v1 === v2) {
          // 결승 득표 동점 → 공동 1위 (2위는 비워둠)
          const reason = `결승 경기 득표가 동점(${v1}표 : ${v2}표)이어서 공동 1위입니다.`;
          rows.push({ rank: 1, entry: entryMap.get(e1), votes: v1, tieReason: reason });
          rows.push({ rank: 1, entry: entryMap.get(e2), votes: v2, tieReason: reason });
        } else if (e1 && e2) {
          const firstId  = v1 >  v2 ? e1 : e2;
          const secondId = v1 >  v2 ? e2 : e1;
          rows.push({ rank: 1, entry: entryMap.get(firstId),  votes: (finalMatch.entryVotes || {})[firstId]  || 0 });
          rows.push({ rank: 2, entry: entryMap.get(secondId), votes: (finalMatch.entryVotes || {})[secondId] || 0 });
        } else if (e1) {
          // 결승이 부전승이 된 특수 케이스
          rows.push({ rank: 1, entry: entryMap.get(e1), votes: v1 });
        }
      }

      // 3위 후보: 준결승에서 진 작품들
      const semiLosers = [];
      semiMatches.forEach(m => {
        const { e1, e2 } = getEffectiveEntries(m, c);
        if (!e1 || !e2) return; // 준결승이 부전승이면 3위 없음
        const loserId = m.winner === e1 ? e2 : e1;
        const votes = (m.entryVotes || {})[loserId] || 0;
        semiLosers.push({ id: loserId, votes });
      });

      if (semiLosers.length === 1) {
        rows.push({ rank: 3, entry: entryMap.get(semiLosers[0].id), votes: semiLosers[0].votes });
      } else if (semiLosers.length >= 2) {
        // 준결승 패자 중 최다 득표 → 3위. 동점이면 공동 3위.
        const maxVotes = Math.max(...semiLosers.map(s => s.votes));
        const top = semiLosers.filter(s => s.votes === maxVotes);
        if (top.length === 1) {
          rows.push({ rank: 3, entry: entryMap.get(top[0].id), votes: top[0].votes });
        } else {
          const reason = `준결승에서 탈락한 작품들의 득표가 동점(각 ${maxVotes}표)이어서 공동 3위입니다.`;
          top.forEach(s => rows.push({ rank: 3, entry: entryMap.get(s.id), votes: s.votes, tieReason: reason }));
        }
      }

      main.innerHTML = `
        <a class="back-link" id="back-home">◀ 처음으로</a>
        <div class="vote-header mt-24">
          <div>
            <div style="font-size:13px; color:var(--color-text-light); margin-bottom:4px;">${c.name} · ${c.source}</div>
            <div class="round-pill">🎉 투표 종료</div>
          </div>
        </div>

        <div class="state-card" style="padding:40px 32px;">
          <span class="emoji">🏆</span>
          <h3>최종 결과 발표</h3>
          <p>여러분의 소중한 투표로 선정된 작품들입니다.</p>

      `;

    function renderFinalistRow(rank, entry, type, voteCount, tieReason) {
      if (!entry) return '';
      const rankClass = rank === 1 ? 'rank-1' : rank === 2 ? 'rank-2' : rank === 3 ? 'rank-3' : 'rank-other';
      const rankText = `${rank}위`;
      let summary = '';
      if (type === 'poem') summary = (entry.lines || []).filter(Boolean).join(' / ');
      else if (type === 'letter') summary = (entry.title || (entry.body || '').slice(0, 40));
      else summary = entry.caption || '';
      return `
        <div class="finalist-row">
          <div style="display:flex; flex-direction:column; align-items:center; gap:4px; min-width:64px;">
            <div class="finalist-rank ${rankClass}">${rankText}</div>
            ${tieReason ? `<div style="font-size:11px; color:#b24d08; font-weight:600; text-align:center; line-height:1.25;">공동</div>` : ''}
          </div>
          <div style="min-width:0;">
            <div style="font-weight:600; color:var(--color-text); margin-bottom:4px;">${escapeHtml(type === 'letter' ? (entry.title || '편지') : type === 'poem' ? '어버이날 4행시' : '사진 작품')}</div>
            <div style="font-size:13px; color:var(--color-text-muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${escapeHtml(summary)}</div>
            ${voteCount > 0 ? `<div style="font-size:12px; color:var(--color-primary); margin-top:4px; font-weight:600;">${voteCount}표</div>` : ''}
            ${tieReason ? `<div style="font-size:12px; color:#b24d08; margin-top:6px; padding:6px 10px; background:#fff3e6; border:1px dashed #f0c79f; border-radius:6px; line-height:1.4;">ℹ️ ${escapeHtml(tieReason)}</div>` : ''}
          </div>
          <button class="btn btn-secondary btn-sm" data-preview-entry="${entry.id}" data-preview-cat="${(state.category||{}).id||''}">자세히 보기</button>
        </div>
      `;
    }

    // ---- ADMIN -------------------------------------------------------
